name: Test Kraken Symbols

on:
  workflow_dispatch:  # run manually from GitHub Actions tab

jobs:
  test-kraken:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Check Kraken symbols
        run: |
          python -c "
          import requests

          HEADERS = {'User-Agent': 'Mozilla/5.0'}
          r = requests.get('https://futures.kraken.com/derivatives/api/v3/tickers', headers=HEADERS)
          print(f'HTTP Status: {r.status_code}')

          tickers = {t['symbol']: t for t in r.json().get('tickers', [])}
          print(f'Total tickers returned: {len(tickers)}')
          print()

          coins = [
              'PF_XBTUSD',  # Bitcoin
              'PF_ETHUSD',  # Ethereum
              'PF_BNBUSD',  # Binance Coin
              'PF_SOLUSD',  # Solana
              'PF_XRPUSD',  # XRP
              'PF_DOGEUSD', # Dogecoin
              'PF_ADAUSD',  # Cardano
              'PF_AVAXUSD', # Avalanche
              'PF_DOTUSD',  # Polkadot
              'PF_LTCUSD',  # Litecoin
              'PF_LINKUSD', # Chainlink
              'PF_TRXUSD',  # TRON
              'PF_ATOMUSD', # Cosmos
              'PF_NEARUSD', # NEAR Protocol
              'PF_XLMUSD',  # Stellar
              'PF_FILUSD',  # Filecoin
              'PF_ALGOUSD', # Algorand
          ]

          print('--- Symbol Check ---')
          found = []
          missing = []
          for s in coins:
              if s in tickers:
                  t = tickers[s]
                  print(f'✅ {s}: markPrice={t.get(\"markPrice\")} fundingRate={t.get(\"fundingRate\")}')
                  found.append(s)
              else:
                  print(f'❌ {s}: MISSING')
                  missing.append(s)

          print()
          print(f'--- Summary ---')
          print(f'Found:   {len(found)}/17')
          print(f'Missing: {missing}')
          "
